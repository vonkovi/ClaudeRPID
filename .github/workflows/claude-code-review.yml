name: Claude Code Review

# Auto-reviews every PR -- backs the "collab_integrator reviews the PR" step of the
# Phase Lifecycle in CLAUDE.md. Requires repo secret CLAUDE_CODE_OAUTH_TOKEN.

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
    # Optional: only review when certain files change.
    # paths:
    #   - "src/**"

jobs:
  claude-review:
    # Optional: only review PRs from first-time / external contributors.
    # if: |
    #   github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
